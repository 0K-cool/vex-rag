name: Claude Code

# Hardening (mirrors Mnemosyne v1.1.0 HIGH-4 / F-06):
#   - author_association allowlist on every trigger prevents random
#     GitHub users from burning ANTHROPIC_API_KEY by typing @claude
#     in a public issue / PR comment.
#   - actions/checkout and claude-code-action pinned to commit SHAs;
#     Dependabot (.github/dependabot.yml) tracks both.
#   - workflow-level read-only permissions; persist-credentials: false
#     on checkout so the GITHUB_TOKEN is not left in the runner's
#     git config after the action returns.
#   - timeout-minutes caps the worst-case spend per dispatch.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR","CONTRIBUTOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR","CONTRIBUTOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR","CONTRIBUTOR"]'), github.event.review.author_association)) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR","CONTRIBUTOR"]'), github.event.issue.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        # v6.0.2 (Dependabot-tracked)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run Claude Code
        id: claude
        # v1 snapshot 2026-04-22 (Dependabot-tracked)
        uses: anthropics/claude-code-action@dde2242db6af13460b916652159b6ba19a598f30
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          additional_permissions: |
            actions: read
